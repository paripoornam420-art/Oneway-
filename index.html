<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bell Taxi | One Way & Round Trip Taxi</title>

<link rel="icon" type="image/png"
href="https://raw.githubusercontent.com/paripoornam420-art/Oneway-/main/logo.png">

<style>
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:Arial;background:#f2f2f2}

/* HEADER */
.header{
background:#fff;
padding:12px 16px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,.08)
}
.logo img{height:48px}
.header-right{display:flex;gap:12px;align-items:center}
.menu{font-size:28px;cursor:pointer}

/* ICONS */
.icon-btn{
width:44px;height:44px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
transition:.3s
}
.icon-btn img{width:22px}
.call-btn{background:#1e40ff}
.wa-btn{background:#25D366}

/* BUTTON GLOW */
button:active,.icon-btn:active{
box-shadow:0 0 15px #f5b000;
transform:scale(0.97);
}

/* MENU DRAWER */
#sideMenu{
position:fixed;
top:0;
right:-100%;
width:80%;
height:100%;
background:#fff;
padding:30px 20px;
transition:.3s ease;
z-index:999;
overflow-y:auto;
}
#sideMenu h3{margin-top:0}
#sideMenu a{
display:block;
font-size:20px;
padding:14px 0;
text-decoration:none;
color:#000;
border-bottom:1px solid #eee;
}
.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.4);
display:none;
z-index:998;
}

/* FORM */
.container{padding:16px;max-width:480px;margin:auto}
.input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:40px;
border:1px solid #ccc;
font-size:16px
}
.green{
background:#2e9c4d;
color:#fff;
border:none
}
.book-btn{
margin-top:18px;
background:#f5b000;
border:none;
padding:16px;
width:100%;
font-size:18px;
border-radius:40px;
font-weight:bold;
cursor:pointer;
transition:.3s
}
.book-btn:disabled{
background:#ccc;
cursor:not-allowed;
}

.toggle{
display:flex;
gap:10px;
background:#f0f0f0;
padding:6px;
border-radius:40px
}
.toggle button{
flex:1;
padding:12px;
border:none;
border-radius:40px;
font-weight:bold;
cursor:pointer
}
.active{background:#f5b000}
.row{display:flex;gap:10px}
.input-wrap{position:relative;width:100%}
.fake{background:#fff}
.real{position:absolute;inset:0;opacity:0}
#returnWrap{display:none}

/* BLINK ANIMATION */
.blink{
animation:blinkAnim 1s infinite;
}
@keyframes blinkAnim{
0%{opacity:1}
50%{opacity:0.4}
100%{opacity:1}
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="logo">
<img src="https://raw.githubusercontent.com/paripoornam420-art/Oneway-/main/logo.png">
</div>

<div class="header-right">
<a href="tel:08110000796" class="icon-btn call-btn">
<img src="https://img.icons8.com/ios-filled/50/ffffff/phone.png">
</a>
<a href="https://wa.me/918110000796" class="icon-btn wa-btn">
<img src="https://img.icons8.com/ios-filled/50/ffffff/whatsapp.png">
</a>
<div class="menu" onclick="openMenu()">☰</div>
</div>
</div>

<!-- MENU -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div id="sideMenu">
<h3>Menu</h3>
<a href="index.html">Home</a>
<a href="service-cities.html">Service Cities</a>
<a href="about-us.html">About Us</a>
<a href="privacy-policy.html">Privacy Policy</a>
<a href="cancellation-policy.html">Cancellation Policy</a>
<a href="terms-and-conditions.html">Terms & Conditions</a>
<a href="luggage-policy.html">Luggage Policy</a>
</div>

<!-- FORM -->
<div class="container">

<div class="toggle">
<button id="one" class="active" onclick="setTrip('oneway')">One Way</button>
<button id="round" onclick="setTrip('round trip')">Round Trip</button>
</div>

<input id="pickup" class="input" placeholder="Pickup Location">

<button id="locBtn" class="input green" onclick="useLocation()">
📍 Use My Current Location
</button>

<input id="drop" class="input" placeholder="Drop Location">

<div class="row">
<div class="input-wrap">
<input id="dateText" class="input fake" placeholder="Date" readonly>
<input id="dateReal" type="date" class="real">
</div>
<div class="input-wrap">
<input id="timeText" class="input fake" placeholder="Time" readonly>
<input id="timeReal" type="time" class="real">
</div>
</div>

<div class="input-wrap" id="returnWrap">
<input id="returnText" class="input fake" placeholder="Return Date" readonly>
<input id="returnReal" type="date" class="real">
</div>

<input id="mobile" class="input" placeholder="Mobile Number">
<input id="name" class="input" placeholder="Full Name">

<button id="checkBtn" class="book-btn" onclick="checkFare()">
Check Fare
</button>

</div>

<script>

/* MENU */
function openMenu(){
document.getElementById("sideMenu").style.right="0";
document.getElementById("overlay").style.display="block";
}
function closeMenu(){
document.getElementById("sideMenu").style.right="-100%";
document.getElementById("overlay").style.display="none";
}

/* GOOGLE INIT */
window.initMap = function(){
new google.maps.places.Autocomplete(
document.getElementById("pickup")
);
new google.maps.places.Autocomplete(
document.getElementById("drop")
);
}

/* CURRENT LOCATION */
function useLocation(){

const btn=document.getElementById("locBtn");
btn.innerText="Detecting Location...";

if(!navigator.geolocation){
alert("Geolocation not supported");
btn.innerText="📍 Use My Current Location";
return;
}

navigator.geolocation.getCurrentPosition(function(pos){

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

const geocoder=new google.maps.Geocoder();
geocoder.geocode({location:{lat:lat,lng:lng}},function(results,status){

if(status==="OK" && results[0]){
document.getElementById("pickup").value=
results[0].formatted_address;
}else{
alert("Unable to detect address");
}

btn.innerText="📍 Use My Current Location";

});

},function(){
alert("Location permission denied");
btn.innerText="📍 Use My Current Location";
});
}

/* TRIP */
let trip="oneway";

function setTrip(type){

trip=type;

document.getElementById("one").classList.remove("active");
document.getElementById("round").classList.remove("active");

if(type==="oneway"){
document.getElementById("one").classList.add("active");
document.getElementById("returnWrap").style.display="none";
}else{
document.getElementById("round").classList.add("active");
document.getElementById("returnWrap").style.display="block";
}

}

/* DATE */
document.getElementById("dateReal").onchange=function(){
document.getElementById("dateText").value=this.value;
};
document.getElementById("timeReal").onchange=function(){
document.getElementById("timeText").value=this.value;
};
document.getElementById("returnReal").onchange=function(){
document.getElementById("returnText").value=this.value;
};

/* CHECK FARE */
function checkFare(){

const pickup=document.getElementById("pickup").value.trim();
const drop=document.getElementById("drop").value.trim();
const date=document.getElementById("dateText").value.trim();
const time=document.getElementById("timeText").value.trim();
const mobile=document.getElementById("mobile").value.trim();
const name=document.getElementById("name").value.trim();
const returnDate=document.getElementById("returnText").value.trim();

/* VALIDATION */
if(!pickup || !drop || !date || !time || !mobile || !name){
alert("Fill all details");
return;
}

if(trip==="round trip" && !returnDate){
alert("Select return date");
return;
}

/* REDIRECT */
window.location.href =
"fare.html?name="+encodeURIComponent(name)
+"&mobile="+encodeURIComponent(mobile)
+"&pickup="+encodeURIComponent(pickup)
+"&drop="+encodeURIComponent(drop)
+"&trip="+trip;

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDXtuY-hFCN0GXyK9_uDBxJYyef1nEWReo&libraries=places&callback=initMap" async defer></script>

</body>
</html>
