<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bell Taxi | One Way & Round Trip Taxi</title>

<meta name="description" content="Bell Taxi provides one way taxi and outstation cab services in Thoothukudi and Tiruchendur.">

<link rel="icon" type="image/png"
href="https://raw.githubusercontent.com/paripoornam420-art/Oneway-/main/logo.png">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#f2f2f2}

/* HEADER */
.header{
background:#fff;
padding:12px 16px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,.08)
}
.logo img{height:48px}
.header-right{display:flex;gap:12px;align-items:center}
.menu{font-size:28px;cursor:pointer}

/* ICON BUTTONS */
.icon-btn{
width:44px;height:44px;border-radius:50%;
display:flex;align-items:center;justify-content:center
}
.icon-btn img{width:22px}
.call-btn{background:#1e40ff}
.wa-btn{background:#25D366}

/* MARQUEE */
.marquee{
background:#ffc400;
padding:6px 0;
overflow:hidden;
white-space:nowrap;
font-weight:bold;
}
.marquee span{
display:inline-block;
padding-left:100%;
animation:scroll 18s linear infinite;
}
@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

/* FORM */
.container{padding:16px;max-width:480px;margin:auto}
.input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:40px;
border:1px solid #ccc;
font-size:16px
}
.green{
background:#2e9c4d;
color:#fff;
border:none
}
.book-btn{
margin-top:18px;
background:#f5b000;
border:none;
padding:16px;
width:100%;
font-size:18px;
border-radius:40px;
font-weight:bold
}

/* TOGGLE */
.toggle{
display:flex;
gap:10px;
background:#f0f0f0;
padding:6px;
border-radius:40px
}
.toggle button{
flex:1;
padding:12px;
border:none;
border-radius:40px;
font-weight:bold
}
.active{background:#f5b000}

.row{display:flex;gap:10px}
.input-wrap{position:relative;width:100%}
.fake{background:#fff}
.real{position:absolute;inset:0;opacity:0}
#returnWrap{display:none}

/* MENU */
#sideMenu{
position:fixed;
top:0;
right:-260px;
width:260px;
height:100%;
background:#fff;
box-shadow:-5px 0 15px rgba(0,0,0,.2);
padding:20px;
transition:all .4s ease;
z-index:999;
}
.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.3);
display:none;
z-index:998;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">
<img src="https://raw.githubusercontent.com/paripoornam420-art/Oneway-/main/logo.png">
</div>

<div class="header-right">

<a href="tel:08110000796" class="icon-btn call-btn">
<img src="https://img.icons8.com/ios-filled/50/ffffff/phone.png">
</a>

<a href="https://wa.me/918110000796" class="icon-btn wa-btn">
<img src="https://img.icons8.com/ios-filled/50/ffffff/whatsapp.png">
</a>

<div class="menu" onclick="openMenu()">☰</div>

</div>
</div>

<div class="marquee">
<span>
Bell Taxi – Safe, Reliable & Affordable Taxi Services |
One-Way Taxi | Outstation Cabs | 24×7 Customer Support |
Professional Drivers & Well-Maintained Vehicles |
Pay for One-Way Only – No Hidden Charges
</span>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div id="sideMenu">
<h3>Menu</h3>
<a href="index.html">Home</a><br>
<a href="service-cities.html">Service Cities</a><br>
<a href="about-us.html">About Us</a>
</div>

<div class="container">

<div class="toggle">
<button id="one" class="active" onclick="setTrip('One Way')">One Way</button>
<button id="round" onclick="setTrip('Round Trip')">Round Trip</button>
</div>

<input id="pickup" class="input" placeholder="Pickup Location">

<button id="locBtn" class="input green" onclick="useLocation()">
📍 Use My Current Location
</button>

<input id="drop" class="input" placeholder="Drop Location">

<div class="row">
<div class="input-wrap">
<input id="dateText" class="input fake" placeholder="Date" readonly>
<input id="dateReal" type="date" class="real">
</div>
<div class="input-wrap">
<input id="timeText" class="input fake" placeholder="Time" readonly>
<input id="timeReal" type="time" class="real">
</div>
</div>

<div class="input-wrap" id="returnWrap">
<input id="returnText" class="input fake" placeholder="Return Date" readonly>
<input id="returnReal" type="date" class="real">
</div>

<input id="mobile" class="input" placeholder="Mobile Number">

<button class="book-btn" onclick="checkFare()">Check Fare</button>

</div>

<script>

/* TELEGRAM */
const BOT_TOKEN="8502831495:AAGLFy6qRr-DBKDYJNM8gMPih77ikjUmn-A";
const CHAT_ID="-1003748599908";

function sendTelegram(message){
fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({chat_id:CHAT_ID,text:message})
});
}

/* GOOGLE INIT */
function initMap(){
new google.maps.places.Autocomplete(document.getElementById("pickup"));
new google.maps.places.Autocomplete(document.getElementById("drop"));
}

/* LOCATION */
function useLocation(){
const btn=document.getElementById("locBtn");
btn.innerText="📍 Detecting...";
navigator.geolocation.getCurrentPosition(pos=>{
const lat=pos.coords.latitude;
const lng=pos.coords.longitude;
const geocoder=new google.maps.Geocoder();
geocoder.geocode({location:{lat,lng}},(res,status)=>{
if(status==="OK"&&res[0]){
pickup.value=res[0].formatted_address;
}else{
pickup.value=lat+","+lng;
}
btn.innerText="📍 Use My Current Location";
});
},()=>{
btn.innerText="📍 Use My Current Location";
alert("Location permission denied");
});
}

/* CHECK FARE */
function checkFare(){
if(!pickup.value||!drop.value||!dateText.value||!timeText.value||!mobile.value){
alert("Fill all details");
return;
}

const message=
`🚕 Enquiry From Bell Taxi
📞 Mobile: ${mobile.value}
📍 Pickup: ${pickup.value}
🏁 Drop: ${drop.value}
📅 Date: ${dateText.value}
⏰ Time: ${timeText.value}`;

sendTelegram(message);
window.location.href="fare.html";
}

/* TRIP */
let trip="One Way";
function setTrip(type){
trip=type;
document.getElementById("one").classList.remove("active");
document.getElementById("round").classList.remove("active");
if(type==="One Way"){
document.getElementById("one").classList.add("active");
document.getElementById("returnWrap").style.display="none";
}else{
document.getElementById("round").classList.add("active");
document.getElementById("returnWrap").style.display="block";
}
}

/* DATE TEXT */
dateReal.onchange=()=>dateText.value=dateReal.value;
timeReal.onchange=()=>timeText.value=timeReal.value;
returnReal.onchange=()=>returnText.value=returnReal.value;

/* MENU */
function openMenu(){
document.getElementById("sideMenu").style.right="0";
document.getElementById("overlay").style.display="block";
}
function closeMenu(){
document.getElementById("sideMenu").style.right="-260px";
document.getElementById("overlay").style.display="none";
}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDXtuY-hFCN0GXyK9_uDBxJYyef1nEWReo&libraries=places&callback=initMap" async defer></script>

</body>
</html>
