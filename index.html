<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bell Taxi | One Way & Round Trip Taxi</title>

<link rel="icon" type="image/png"
href="https://raw.githubusercontent.com/paripoornam420-art/Oneway-/main/logo.png">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#f2f2f2}

/* HEADER */
.header{
background:#fff;
padding:12px 16px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,.08)
}
.logo img{height:48px}
.header-right{display:flex;gap:12px;align-items:center}
.menu{font-size:28px;cursor:pointer}

/* ICONS */
.icon-btn{
width:44px;height:44px;border-radius:50%;
display:flex;align-items:center;justify-content:center
}
.icon-btn img{width:22px}
.call-btn{background:#1e40ff}
.wa-btn{background:#25D366}

/* MENU */
#sideMenu{
position:fixed;top:0;right:-100%;
width:80%;height:100%;
background:#fff;padding:30px 20px;
transition:.3s ease;z-index:999;overflow-y:auto
}
#sideMenu a{
display:block;font-size:20px;
padding:14px 0;text-decoration:none;color:#000;
border-bottom:1px solid #eee
}
.overlay{
position:fixed;top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.4);
display:none;z-index:998
}

/* MARQUEE */
.marquee{
background:#ffc400;padding:6px 0;
overflow:hidden;white-space:nowrap;font-weight:bold
}
.marquee span{
display:inline-block;padding-left:100%;
animation:scroll 18s linear infinite
}
@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

/* FORM */
.container{padding:16px;max-width:480px;margin:auto}
.input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:40px;
border:1px solid #ccc;
font-size:16px
}
.green{background:#2e9c4d;color:#fff;border:none}
.book-btn{
margin-top:18px;
background:#f5b000;
border:none;
padding:16px;
width:100%;
font-size:18px;
border-radius:40px;
font-weight:bold
}
.toggle{
display:flex;
gap:10px;
background:#f0f0f0;
padding:6px;
border-radius:40px
}
.toggle button{
flex:1;
padding:12px;
border:none;
border-radius:40px;
font-weight:bold
}
.active{background:#f5b000}
.row{display:flex;gap:10px}
.input-wrap{position:relative;width:100%}
.fake{background:#fff}
.real{position:absolute;inset:0;opacity:0}
#returnWrap{display:none}
</style>
</head>

<body>

<div class="header">
<div class="logo">
<img src="https://raw.githubusercontent.com/paripoornam420-art/Oneway-/main/logo.png">
</div>
<div class="header-right">
<a href="tel:08110000796" class="icon-btn call-btn">
<img src="https://img.icons8.com/ios-filled/50/ffffff/phone.png">
</a>
<a href="https://wa.me/918110000796" class="icon-btn wa-btn">
<img src="https://img.icons8.com/ios-filled/50/ffffff/whatsapp.png">
</a>
<div class="menu" onclick="openMenu()">☰</div>
</div>
</div>

<div class="marquee">
<span>
Bell Taxi – Safe, Reliable & Affordable Taxi Services |
One-Way Taxi | Outstation Cabs | 24×7 Customer Support |
Pay for One-Way Only – No Hidden Charges
</span>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div id="sideMenu">
<a href="index.html">Home</a>
<a href="#">Service Cities</a>
<a href="#">About Us</a>
<a href="#">Privacy Policy</a>
</div>

<div class="container">

<div class="toggle">
<button id="oneBtn" class="active" type="button">One Way</button>
<button id="roundBtn" type="button">Round Trip</button>
</div>

<input id="pickup" class="input" placeholder="Pickup Location">

<button id="locBtn" class="input green" type="button">
📍 Use My Current Location
</button>

<input id="drop" class="input" placeholder="Drop Location">

<div class="row">
<div class="input-wrap">
<input id="dateText" class="input fake" placeholder="Date" readonly>
<input id="dateReal" type="date" class="real">
</div>
<div class="input-wrap">
<input id="timeText" class="input fake" placeholder="Time" readonly>
<input id="timeReal" type="time" class="real">
</div>
</div>

<div class="input-wrap" id="returnWrap">
<input id="returnText" class="input fake" placeholder="Return Date" readonly>
<input id="returnReal" type="date" class="real">
</div>

<input id="mobile" class="input" placeholder="Mobile Number">
<input id="name" class="input" placeholder="Full Name">

<button id="checkBtn" class="book-btn">Check Fare</button>

</div>

<script>

/* WAIT FOR DOM */
document.addEventListener("DOMContentLoaded", function(){

const pickup = document.getElementById("pickup");
const drop = document.getElementById("drop");
const dateText = document.getElementById("dateText");
const dateReal = document.getElementById("dateReal");
const timeText = document.getElementById("timeText");
const timeReal = document.getElementById("timeReal");
const returnWrap = document.getElementById("returnWrap");
const returnText = document.getElementById("returnText");
const returnReal = document.getElementById("returnReal");
const mobile = document.getElementById("mobile");
const name = document.getElementById("name");
const checkBtn = document.getElementById("checkBtn");
const locBtn = document.getElementById("locBtn");

let trip="oneway";

/* TOGGLE */
document.getElementById("oneBtn").onclick=function(){
trip="oneway";
this.classList.add("active");
document.getElementById("roundBtn").classList.remove("active");
returnWrap.style.display="none";
}

document.getElementById("roundBtn").onclick=function(){
trip="round trip";
this.classList.add("active");
document.getElementById("oneBtn").classList.remove("active");
returnWrap.style.display="block";
}

/* DATE FIX */
dateReal.onchange=()=>dateText.value=dateReal.value;
timeReal.onchange=()=>timeText.value=timeReal.value;
returnReal.onchange=()=>returnText.value=returnReal.value;

/* CURRENT LOCATION FIXED */
locBtn.onclick=function(){
locBtn.innerText="Detecting location...";
navigator.geolocation.getCurrentPosition(function(position){
const geocoder=new google.maps.Geocoder();
const latlng={
lat:position.coords.latitude,
lng:position.coords.longitude
};
geocoder.geocode({location:latlng},function(results,status){
if(status==="OK" && results[0]){
pickup.value=results[0].formatted_address;
}
locBtn.innerText="📍 Use My Current Location";
});
},function(){
locBtn.innerText="📍 Use My Current Location";
alert("Location permission denied");
});
}

/* CHECK FARE FIXED */
checkBtn.onclick=function(){

if(!pickup.value || !drop.value || !dateText.value ||
!timeText.value || !mobile.value || !name.value){
alert("Fill all details");
return;
}

checkBtn.disabled=true;

window.location.href=
`fare.html?name=${encodeURIComponent(name.value)}
&mobile=${encodeURIComponent(mobile.value)}
&pickup=${encodeURIComponent(pickup.value)}
&drop=${encodeURIComponent(drop.value)}
&trip=${trip}`;

}

});

/* GOOGLE AUTOCOMPLETE */
function initMap(){
new google.maps.places.Autocomplete(document.getElementById("pickup"));
new google.maps.places.Autocomplete(document.getElementById("drop"));
}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDXtuY-hFCN0GXyK9_uDBxJYyef1nEWReo&libraries=places&callback=initMap" async defer></script>

</body>
</html>
