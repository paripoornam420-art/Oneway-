<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bell Taxi | One Way & Round Trip Taxi</title>

<link rel="icon" type="image/png"
href="https://raw.githubusercontent.com/paripoornam420-art/Oneway-/main/logo.png">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#f2f2f2}

/* HEADER */
.header{
background:#fff;
padding:12px 16px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,.08)
}
.logo img{height:48px}
.header-right{display:flex;gap:12px;align-items:center}
.menu{font-size:28px;cursor:pointer}
.icon-btn{
width:44px;height:44px;border-radius:50%;
display:flex;align-items:center;justify-content:center
}
.icon-btn img{width:22px}
.call-btn{background:#1e40ff}
.wa-btn{background:#25D366}

/* MENU */
#sideMenu{
position:fixed;top:0;right:-100%;
width:80%;height:100%;
background:#fff;padding:30px 20px;
transition:.3s ease;z-index:999
}
#sideMenu a{
display:block;font-size:20px;
padding:14px 0;text-decoration:none;color:#000
}
.overlay{
position:fixed;top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.4);
display:none;z-index:998
}

/* MARQUEE */
.marquee{
background:#ffc400;padding:6px 0;
overflow:hidden;white-space:nowrap;font-weight:bold
}
.marquee span{
display:inline-block;padding-left:100%;
animation:scroll 18s linear infinite
}
@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

/* FORM */
.container{padding:16px;max-width:480px;margin:auto}
.input{
width:100%;padding:14px;margin-top:12px;
border-radius:40px;border:1px solid #ccc;font-size:16px
}
.green{background:#2e9c4d;color:#fff;border:none}
.book-btn{
margin-top:18px;background:#f5b000;
border:none;padding:16px;width:100%;
font-size:18px;border-radius:40px;font-weight:bold
}
.toggle{
display:flex;gap:10px;background:#f0f0f0;
padding:6px;border-radius:40px;margin-bottom:12px
}
.toggle button{
flex:1;padding:12px;border:none;
border-radius:40px;font-weight:bold;cursor:pointer
}
.active{background:#f5b000}
.row{display:flex;gap:10px}
</style>
</head>

<body>

<div class="header">
<div class="logo">
<img src="https://raw.githubusercontent.com/paripoornam420-art/Oneway-/main/logo.png">
</div>
<div class="header-right">
<a href="tel:08110000796" class="icon-btn call-btn">
<img src="https://img.icons8.com/ios-filled/50/ffffff/phone.png">
</a>
<a href="https://wa.me/918110000796" class="icon-btn wa-btn">
<img src="https://img.icons8.com/ios-filled/50/ffffff/whatsapp.png">
</a>
<div class="menu" onclick="openMenu()">☰</div>
</div>
</div>

<div class="marquee">
<span>
Bell Taxi – Safe, Reliable & Affordable Taxi Services |
One-Way Taxi | Outstation Cabs | 24×7 Customer Support |
Pay for One-Way Only – No Hidden Charges
</span>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div id="sideMenu">
<a href="#">Home</a>
<a href="#">Service Cities</a>
<a href="#">About Us</a>
<a href="#">Privacy Policy</a>
</div>

<div class="container">

<div class="toggle">
<button id="oneBtn" class="active" onclick="setTrip('oneway')">One Way</button>
<button id="roundBtn" onclick="setTrip('round')">Round Trip</button>
</div>

<input id="pickup" class="input" placeholder="Pickup Location">

<button id="locBtn" class="input green" onclick="useLocation()">
📍 Use My Current Location
</button>

<input id="drop" class="input" placeholder="Drop Location">

<div class="row">
<input id="date" type="text" class="input"
placeholder="Date"
onfocus="this.type='date'"
onblur="if(!this.value)this.type='text'">

<input id="time" type="text" class="input"
placeholder="Time"
onfocus="this.type='time'"
onblur="if(!this.value)this.type='text'">
</div>

<div id="returnWrap" style="display:none;">
<input id="returnDate" type="text" class="input"
placeholder="Return Date"
onfocus="this.type='date'"
onblur="if(!this.value)this.type='text'">
</div>

<input id="mobile" class="input" placeholder="Mobile Number">
<input id="name" class="input" placeholder="Full Name">

<button id="checkBtn" class="book-btn" onclick="checkFare()">Check Fare</button>

</div>

<script>

let trip="oneway";

/* MENU */
function openMenu(){
document.getElementById("sideMenu").style.right="0";
document.getElementById("overlay").style.display="block";
}
function closeMenu(){
document.getElementById("sideMenu").style.right="-100%";
document.getElementById("overlay").style.display="none";
}

/* TOGGLE */
function setTrip(type){
trip=type;
document.getElementById("oneBtn").classList.remove("active");
document.getElementById("roundBtn").classList.remove("active");

if(type==="oneway"){
document.getElementById("oneBtn").classList.add("active");
document.getElementById("returnWrap").style.display="none";
}else{
document.getElementById("roundBtn").classList.add("active");
document.getElementById("returnWrap").style.display="block";
}
}

/* LOCATION */
function useLocation(){
const btn=document.getElementById("locBtn");
const pickup=document.getElementById("pickup");

btn.disabled=true;
pickup.value="Searching for Location...";

navigator.geolocation.getCurrentPosition(function(position){

const geocoder=new google.maps.Geocoder();

geocoder.geocode(
{location:{lat:position.coords.latitude,lng:position.coords.longitude}},
function(results,status){

if(status==="OK" && results[0]){
pickup.value=results[0].formatted_address;
}else{
pickup.value="Location not found";
}

btn.disabled=false;

});

},function(){
pickup.value="Permission denied";
btn.disabled=false;
},{timeout:10000});
}

/* CHECK FARE */
async function checkFare(){

const btn=document.getElementById("checkBtn");
btn.disabled=true;
setTimeout(()=>{btn.disabled=false},10000);

const pickup=document.getElementById("pickup").value.trim();
const drop=document.getElementById("drop").value.trim();
const date=document.getElementById("date").value;
const time=document.getElementById("time").value;
const returnDate=document.getElementById("returnDate")?.value || null;
const carType=document.getElementById("carType")?.value || "Sedan";

if(!pickup||!drop||!date||!time){
alert("Fill all details");
return;
}

/* CAR RATE SETUP */
let perKm=13;
if(carType==="Premium Sedan") perKm=14;
if(carType==="SUV") perKm=19;
if(carType==="Premium SUV") perKm=20;

const baseFare=400;

/* GOOGLE DISTANCE */
const service=new google.maps.DistanceMatrixService();

service.getDistanceMatrix({
origins:[pickup],
destinations:[drop],
travelMode:'DRIVING',
unitSystem:google.maps.UnitSystem.METRIC
}, async function(response,status){

if(status!=="OK"){
alert("Distance error");
return;
}

const result=response.rows[0].elements[0];
if(result.status!=="OK"){
alert("Invalid route");
return;
}

const actualKM=result.distance.value/1000;
let totalFare=0;
let totalKM=actualKM;

const isThoothukudi=pickup.toLowerCase().includes("thoothukudi");

/* ONE WAY */
if(!returnDate){

let minKM=130;
if(isThoothukudi) minKM=100;

totalKM=Math.max(actualKM,minKM);
totalFare=baseFare+(totalKM*perKm);

}

/* ROUND TRIP */
else{

const start=new Date(date);
const end=new Date(returnDate);
const diffTime=end-start;
const days=Math.floor(diffTime/(1000*60*60*24))+1;

/* Thoothukudi 1 Day Special */
if(isThoothukudi && days===1){

totalKM=Math.max(actualKM,150);
totalFare=2800;

if(actualKM>150){
totalFare+=((actualKM-150)*perKm);
}

/* EXTRA HOURS */
const travelHours=result.duration.value/3600;
if(travelHours>10){
const extraHours=Math.ceil(travelHours-10);
totalFare+=(extraHours*120);
}

}

/* Normal Multi-Day Round Trip */
else{

const minKM=250*days;
totalKM=Math.max(actualKM,minKM);
totalFare=baseFare+(totalKM*perKm);

}

}

totalFare=Math.round(totalFare);

/* TELEGRAM */
const msg=`🚕 Bell Taxi Enquiry

Pickup: ${pickup}
Drop: ${drop}
Car: ${carType}
Distance: ${Math.round(totalKM)} KM
Estimated Fare: ₹${totalFare}`;

try{
await fetch("https://api.telegram.org/bot8502831495:AAGLFy6qRr-DBKDYJNM8gMPih77ikjUmn-A/sendMessage",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:"-1003748599908",
text:msg
})
});
}catch(e){}

/* REDIRECT */
window.location.href=`fare.html?fare=${totalFare}&km=${Math.round(totalKM)}`;

});

}

/* GOOGLE MAP INIT */
function initMap(){
new google.maps.places.Autocomplete(document.getElementById("pickup"));
new google.maps.places.Autocomplete(document.getElementById("drop"));
}

</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDXtuY-hFCN0GXyK9_uDBxJYyef1nEWReo&libraries=places&callback=initMap">
</script>

</body>
</html>
