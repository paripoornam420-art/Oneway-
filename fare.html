<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bell Taxi Fare</title>

<link rel="icon" type="image/png"
href="https://raw.githubusercontent.com/paripoornam420-art/Oneway-/main/logo.png">

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#f2f2f2}

/* HEADER */
.header{
background:#fff;
padding:12px 16px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,.08)
}
.logo img{height:48px}
.header-right{display:flex;gap:12px;align-items:center}
.menu{font-size:28px;cursor:pointer}
.icon-btn{
width:44px;height:44px;border-radius:50%;
display:flex;align-items:center;justify-content:center
}
.icon-btn img{width:22px}
.call-btn{background:#1e40ff}
.wa-btn{background:#25D366}

/* MENU */
#sideMenu{
position:fixed;top:0;right:-100%;
width:80%;height:100%;
background:#fff;padding:30px 20px;
transition:.3s ease;z-index:999
}
#sideMenu a{
display:block;font-size:20px;
padding:14px 0;text-decoration:none;color:#000
}
.overlay{
position:fixed;top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.4);
display:none;z-index:998
}

/* MARQUEE */
.marquee{
background:#ffc400;padding:6px 0;
overflow:hidden;white-space:nowrap;font-weight:bold
}
.marquee span{
display:inline-block;padding-left:100%;
animation:scroll 18s linear infinite
}
@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

/* CONTENT */
.container{padding:16px}
.card{
background:#fff;border-radius:25px;
padding:20px;margin-bottom:20px;
box-shadow:0 6px 18px rgba(0,0,0,.08)
}
.car-title{font-size:18px;font-weight:bold;margin-bottom:8px}
.sub{font-size:14px;color:#666;margin-bottom:8px}
.price{font-size:26px;font-weight:bold;color:#2e9c4d;margin-bottom:8px}

.pay-box{
background:#f9f9f9;padding:10px;
border-radius:12px;margin-top:10px
}
.radio{
display:flex;justify-content:space-between;
margin-bottom:8px;font-size:14px
}

.book-btn{
margin-top:12px;background:#f5b000;
border:none;padding:14px;width:100%;
font-size:16px;border-radius:30px;
font-weight:bold;cursor:pointer
}

.note{text-align:center;font-size:12px;color:#777;margin-top:10px}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="logo">
<img src="https://raw.githubusercontent.com/paripoornam420-art/Oneway-/main/logo.png">
</div>
<div class="header-right">
<a href="tel:08110000796" class="icon-btn call-btn">
<img src="https://img.icons8.com/ios-filled/50/ffffff/phone.png">
</a>
<a href="https://wa.me/918110000796" class="icon-btn wa-btn">
<img src="https://img.icons8.com/ios-filled/50/ffffff/whatsapp.png">
</a>
<div class="menu" onclick="openMenu()">☰</div>
</div>
</div>

<div class="marquee">
<span>
Bell Taxi – Safe, Reliable & Affordable Taxi Services |
One-Way Taxi | Outstation Cabs | 24×7 Customer Support |
Pay for One-Way Only – No Hidden Charges
</span>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div id="sideMenu">
<a href="index.html">Home</a>
<a href="service-cities.html">Service Cities</a>
<a href="about-us.html">About Us</a>
<a href="privacy-policy.html">Privacy Policy</a>
<a href="cancellation-policy.html">Cancellation Policy</a>
<a href="terms-and-conditiona.html">Terms & Conditions</a>
<a href="luggage-policy.html">Luggage Policy</a>
</div>

<div class="container">
<div id="fareContainer"></div>
<div class="note">Toll / Parking / State Permit Charges Extra</div>
</div>

<script>

/* MENU */
function openMenu(){
sideMenu.style.right="0";
overlay.style.display="block";
}
function closeMenu(){
sideMenu.style.right="-100%";
overlay.style.display="none";
}

/* NEW TELEGRAM BOT */
const BOT_TOKEN="8335405675:AAEk3BCfHvABEC60Ox_JaO3NneHQ9HNqSK4";
const CHAT_ID="-1003520333892";

/* READ URL DATA */
const params=new URLSearchParams(window.location.search);

const fare=parseInt(params.get("fare")) || 0;
const km=params.get("km") || 0;
const car=params.get("car") || "Car";
const pickup=params.get("pickup") || "";
const drop=params.get("drop") || "";
const trip=params.get("trip") || "";
const name=params.get("name") || "";
const mobile=params.get("mobile") || "";

const bookingID="BT-"+Math.floor(10000+Math.random()*90000);

/* SHOW FARE CARD */
fareContainer.innerHTML=`
<div class="card">
<div class="car-title">${car}</div>
<div class="sub">
Pickup: ${pickup}<br>
Drop: ${drop}<br>
Distance: ${km} KM<br>
Trip: ${trip}
</div>
<div class="price">₹ ${fare}</div>

<div class="pay-box">
<div class="radio">
<label>
<input type="radio" name="paytype" value="advance" checked>
Advance ₹500
</label>
<span>Balance ₹${fare-500}</span>
</div>

<div class="radio">
<label>
<input type="radio" name="paytype" value="full">
Full Payment
</label>
<span>₹${fare}</span>
</div>
</div>

<button class="book-btn" onclick="startPayment()">
Proceed to Pay
</button>
</div>
`;

/* PAYMENT FUNCTION */
function startPayment(){

let type=document.querySelector('input[name="paytype"]:checked').value;
let payAmount = type==="advance" ? 500 : fare;
let balance = fare - payAmount;

var options={
"key":"rzp_live_3LcdTeTeyHKk5j",
"amount":payAmount*100,
"currency":"INR",
"name":"Bell Taxi",
"description":car+" Booking",
"handler":function(response){

const message=
`🚕 Bell Taxi Booking Confirmed

🆔 Booking ID: ${bookingID}
👤 Name: ${name}
📞 Mobile: ${mobile}
📍 Pickup: ${pickup}
🏁 Drop: ${drop}
🚗 Car: ${car}
🛣 Distance: ${km} KM
🧭 Trip: ${trip}

💰 Total Fare: ₹${fare}
💳 Paid: ₹${payAmount}
💼 Balance: ₹${balance}

🆔 Payment ID: ${response.razorpay_payment_id}`;

fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:CHAT_ID,
text:message
})
});

window.location.href=
`confirm.html?id=${bookingID}
&name=${encodeURIComponent(name)}
&mobile=${encodeURIComponent(mobile)}
&pickup=${encodeURIComponent(pickup)}
&drop=${encodeURIComponent(drop)}
&car=${encodeURIComponent(car)}
&fare=${fare}
&paid=${payAmount}
&balance=${balance}`;
},
"prefill":{"name":name,"contact":mobile},
"theme":{"color":"#f5b000"}
};

new Razorpay(options).open();

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDXtuY-hFCN0GXyK9_uDBxJYyef1nEWReo&libraries=places&callback=initFare" async defer></script>

</body>
</html>
