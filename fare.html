<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bell Taxi Fare Details</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f2f2f2;
padding:16px;
}

.header{
text-align:center;
font-size:20px;
font-weight:bold;
margin-bottom:15px;
}

.card{
background:#fff;
border-radius:25px;
padding:20px;
margin-bottom:20px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.car-title{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.km{
font-size:14px;
color:#555;
margin-bottom:10px;
}

.price{
font-size:26px;
font-weight:bold;
color:#2e9c4d;
margin-bottom:8px;
}

.details{
font-size:14px;
color:#666;
line-height:22px;
}

.book-btn{
margin-top:15px;
background:#f5b000;
border:none;
padding:14px;
width:100%;
font-size:16px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}

.note{
text-align:center;
font-size:12px;
color:#777;
margin-top:20px;
}
</style>
</head>

<body>

<div class="header">
Bell Taxi Fare Details
</div>

<div id="fareContainer"></div>

<div class="note">
Toll / Parking / State Permit Charges Extra
</div>

<script>

/* TELEGRAM CONFIG */
const BOT_TOKEN="8335405675:AAE4Ag40b777r_mJEPgElL5z3HOm2Ff0crM";
const CHAT_ID="-1003520333892";

/* GET URL DATA */
const params=new URLSearchParams(window.location.search);
const bookingID=params.get("id") || generateBookingID();
const km=parseFloat(params.get("km")) || 0;
const trip=(params.get("trip") || "oneway").toLowerCase();
const name=params.get("name") || "Customer";
const mobile=params.get("mobile") || "Not Provided";
const pickup=params.get("pickup") || "Not Provided";
const drop=params.get("drop") || "Not Provided";

/* RATES */
const fareOptions = [
  { name: "Sedan (Zest / Swift)", rate: 13 },
  { name: "Premium Sedan (Etios / City)", rate: 16 },
  { name: "SUV (Innova)", rate: 20 },
  { name: "Traveller (Tempo Traveller 12 Seater)", rate: 28 }
];

/* BOOKING ID GENERATOR */
function generateBookingID(){
const now=new Date();
const month=String(now.getMonth()+1).padStart(2,'0');
let count=localStorage.getItem("dtCount")||1;
localStorage.setItem("dtCount",++count);
return `DT-${month}-${String(count).padStart(3,'0')}`;
}

/* CALCULATE FARE */
function calculate(rate){
let total=km*rate;
if(trip==="round trip"){
total=km*2*rate;
}
return Math.round(total);
}

/* TELEGRAM SEND */
function sendTelegram(message){
fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({chat_id:CHAT_ID,text:message})
});
}

/* CREATE CARD */
function createCard(option){
const total=calculate(option.rate);

return `
<div class="card">
<div class="car-title">${option.name}</div>
<div class="km">Distance: ${km.toFixed(2)} KM | Trip: ${trip}</div>
<div class="price">₹ ${total}</div>
<div class="details">
• Fare per KM: ₹${option.rate}<br>
• Booking ID: ${bookingID}
</div>
<button class="book-btn"
onclick="confirmBooking('${option.name}',${option.rate},${total})">
Confirm Booking
</button>
</div>`;
}

/* RENDER ALL CAR TYPES */
let html="";
fareOptions.forEach(opt=>{ html+=createCard(opt); });
document.getElementById("fareContainer").innerHTML=html;

/* CONFIRM BOOKING */
function confirmBooking(car,rate,total){
const message =
`🚕 Booking from Bell Taxi 

🆔 Booking ID: ${bookingID}

👤 Name: ${name}
📞 Contact: ${mobile}
📍 Pickup: ${pickup}
🏁 Drop: ${drop}
🧭 Trip: ${trip}

🚗 Car: ${car}
💰 Total Fare: ₹${total}
📏 Included KM: ${km.toFixed(2)} KM
📊 Per KM: ₹${rate}/KM

🛣 Toll / Parking / Permit: Charges Extra`;

sendTelegram(message);
window.location.href=`confirm.html?id=${bookingID}&fare=${total}&car=${car}`;
}

</script>

</body>
</html>
