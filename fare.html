<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bell Taxi Fare</title>

<link rel="icon" type="image/png"
href="https://raw.githubusercontent.com/paripoornam420-art/Oneway-/main/logo.png">

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#f4f6f9}

/* HEADER */
.header{
background:#fff;
padding:12px 16px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,.08)
}
.logo img{height:48px}
.header-right{display:flex;gap:12px;align-items:center}
.menu{font-size:28px;cursor:pointer}
.icon-btn{
width:44px;height:44px;border-radius:50%;
display:flex;align-items:center;justify-content:center
}
.icon-btn img{width:22px}
.call-btn{background:#1e40ff}
.wa-btn{background:#25D366}

/* MENU */
#sideMenu{
position:fixed;top:0;right:-100%;
width:80%;height:100%;
background:#fff;padding:30px 20px;
transition:.3s ease;z-index:999
}
#sideMenu a{
display:block;font-size:18px;
padding:14px 0;text-decoration:none;color:#000;
border-bottom:1px solid #eee
}
.overlay{
position:fixed;top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.4);
display:none;z-index:998
}

/* CONTENT */
.container{padding:16px}

.card{
background:#fff;
border-radius:22px;
padding:20px;
margin-bottom:20px;
box-shadow:0 8px 20px rgba(0,0,0,.06);
position:relative;
}

.badge{
position:absolute;
top:12px;
right:12px;
background:linear-gradient(45deg,#ff9800,#ff5722);
color:#fff;
padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

.card-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}
.car-title{font-size:18px;font-weight:700}
.trip-type{font-size:13px;color:#777}

.total-fare{
font-size:28px;
font-weight:900;
color:#1e7e34;
margin:8px 0;
}
.upto{font-size:14px;font-weight:600;margin-bottom:6px}
.extra{font-size:14px;margin-bottom:4px}
.note-line{font-size:12px;color:#777;margin-bottom:12px}

.pay-box{
background:#f2f3f5;
padding:14px;
border-radius:16px;
}
.radio{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;
font-size:14px;
}

.book-btn{
margin-top:12px;
background:#f5b000;
border:none;
padding:14px;
width:100%;
font-size:16px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}
.driver-btn{
margin-top:10px;
background:#2e9c4d;
color:#fff;
border:none;
padding:14px;
width:100%;
font-size:15px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">
<img src="https://raw.githubusercontent.com/paripoornam420-art/Oneway-/main/logo.png">
</div>
<div class="header-right">
<a href="tel:08110000796" class="icon-btn call-btn">
<img src="https://img.icons8.com/ios-filled/50/ffffff/phone.png">
</a>
<a href="https://wa.me/918110000796" class="icon-btn wa-btn">
<img src="https://img.icons8.com/ios-filled/50/ffffff/whatsapp.png">
</a>
<div class="menu" onclick="openMenu()">☰</div>
</div>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div id="sideMenu">
<a href="index.html">Home</a>
<a href="#">Service Cities</a>
<a href="#">About Us</a>
<a href="#">Privacy Policy</a>
</div>

<div class="container">
<div id="fareContainer"></div>
</div>

<script>

/* MENU */
function openMenu(){
sideMenu.style.right="0";
overlay.style.display="block";
}
function closeMenu(){
sideMenu.style.right="-100%";
overlay.style.display="none";
}

/* TELEGRAM */
const BOT_TOKEN="8335405675:AAEk3BCfHvABEC60Ox_JaO3NneHQ9HNqSK4";
const CHAT_ID="-1003520333892";

/* URL DATA */
const params=new URLSearchParams(window.location.search);

const km=parseInt(params.get("km"))||0;
const pickup=params.get("pickup")||"";
const drop=params.get("drop")||"";
const trip=params.get("trip")||"oneway";
const name=params.get("name")||"";
const mobile=params.get("mobile")||"";
const date=params.get("date")||"";
const time=params.get("time")||"";
const returnDate=params.get("returnDate")||"";

const bookingID="BT-"+Math.floor(100000+Math.random()*900000);

/* DAYS */
let days=1;
if(trip==="round" && returnDate){
let start=new Date(date);
let end=new Date(returnDate);
days=Math.floor((end-start)/(1000*60*60*24))+1;
if(days<1) days=1;
}

const cars=[
{name:"Sedan",rate:13,badge:"Most Booked"},
{name:"Premium Sedan",rate:14},
{name:"SUV",rate:19},
{name:"Premium SUV",rate:20}
];

let html="";

cars.forEach(car=>{

let minKM=130;
let total=0;

/* ONE WAY */
if(trip==="oneway"){
minKM=pickup.toLowerCase().includes("thoothukudi")?100:130;
let usedKM=Math.max(km,minKM);
total=Math.round(400+(usedKM*car.rate));
}

/* ROUND TRIP */
if(trip==="round"){

if(pickup.toLowerCase().includes("thoothukudi") && days===1){
minKM=150;
if(km<=150){
total=2800;
}else{
total=2800+((km-150)*car.rate);
}
}else{
minKM=250*days;
let usedKM=Math.max(km,minKM);
total=Math.round(400+(usedKM*car.rate));
}
}

html+=`
<div class="card">
${car.badge?`<div class="badge">${car.badge}</div>`:""}
<div class="card-header">
<div class="car-title">${car.name}</div>
<div class="trip-type">${trip}</div>
</div>

<div class="total-fare">₹ ${total}</div>
<div class="upto">Upto ${minKM} KM (${days} Day${days>1?'s':''})</div>
<div class="extra">Extra KM: ₹${car.rate} / KM</div>
<div class="note-line">
${car.name.includes("SUV")
? "Toll, Parking, State Permit, Carrier Charges Extra"
: "Toll, Parking, State Permit Charges Extra"}
</div>

<div class="pay-box">
<div class="radio">
<label><input type="radio" name="pay_${car.name}" value="advance" checked> Advance ₹500</label>
<span>Balance ₹${total-500}</span>
</div>
<div class="radio">
<label><input type="radio" name="pay_${car.name}" value="full"> Full Payment</label>
<span>₹${total}</span>
</div>
</div>

<button class="book-btn"
onclick="startPayment('${car.name}',${total})">
Proceed to Pay
</button>

<button class="driver-btn"
onclick="payToDriver('${car.name}',${total})">
Pay Full Amount To Driver
</button>
</div>
`;
});

fareContainer.innerHTML=html;

/* TELEGRAM */
function sendTelegram(car,total,paid,balance,type,paymentID){

const message=
`🚕 Bell Taxi Booking Confirmation

🆔 Booking ID: ${bookingID}

👤 Name: ${name}
📞 Mobile: ${mobile}

📍 Pickup: ${pickup}
🏁 Drop: ${drop}

🚗 Car: ${car}
🚘 Trip Type: ${trip}
📅 Date: ${date}
⏰ Time: ${time}

📏 Distance: ${km} KM

💰 Total: ₹${total}
💵 Paid: ₹${paid}
💼 Balance: ₹${balance}
💳 Payment Type: ${type}
🆔 Payment ID: ${paymentID}`;

fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:CHAT_ID,
text:message
})
});

}

/* PAYMENT */
function startPayment(car,total){

let selected=document.querySelector(`input[name="pay_${car}"]:checked`);
let type=selected.value;
let payAmount=type==="advance"?500:total;
let balance=total-payAmount;

var options={
"key":"rzp_live_3LcdTeTeyHKk5j",
"amount":payAmount*100,
"currency":"INR",
"name":"Bell Taxi",
"description":car+" Booking",
"handler":function(response){
sendTelegram(car,total,payAmount,balance,"ONLINE",response.razorpay_payment_id);
redirectConfirm(car,total,payAmount,balance);
}
};

new Razorpay(options).open();
}

function payToDriver(car,total){

if(!confirm("Confirm Pay Full Amount To Driver?")) return;

const message =
`🚕 Bell Taxi Booking Confirmation

🆔 Booking ID: ${bookingID}

👤 Name: ${name}
📞 Mobile: ${mobile}

📍 Pickup: ${pickup}
🏁 Drop: ${drop}

🚗 Car: ${car}
🚘 Trip Type: ${trip}
📅 Date: ${date}
⏰ Time: ${time}

📏 Distance: ${km} KM

💰 Total: ₹${total}
💵 Paid: ₹0
💼 Balance: ₹${total}
💳 Payment Type: PAY TO DRIVER
🆔 Payment ID: N/A`;

fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:CHAT_ID,
text:message
})
})
.then(()=>{

localStorage.setItem("finalBooking",JSON.stringify({
bookingID:bookingID,
name:name,
contact:mobile,
pickup:pickup,
drop:drop,
tripType:trip,
car:car,
total:total,
mobile:mobile
}));

window.location.href="confirm.html";

})
.catch(err=>{
console.log("Telegram Error:",err);
alert("Telegram send failed");
});

}
</script>

</body>
</html>
